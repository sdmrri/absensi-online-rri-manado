<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Presensi RRI Manado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 24px;
            overflow: hidden;
            background: #0f172a;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .captured-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        }
        .timestamp-overlay {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            text-align: center;
        }
        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        /* Loading Overlay */
        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Photo Preview Modal Style (Optional visual enhancement) */
        .history-thumb {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            background: #f1f5f9;
        }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <!-- Loading Screen -->
    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-sm font-bold text-slate-600">Memproses Presensi...</p>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col pb-20">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-6 py-5 border-b border-blue-50 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-10 flex items-center justify-center overflow-hidden">
                    <img id="logoSource" src="https://lh3.googleusercontent.com/d/1UxSp_9U6A4wiDz-GarFhM31m3Ynrmdus" alt="Logo RRI" class="h-full w-auto object-contain" crossorigin="anonymous" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black\'>R</div>';">
                </div>
                <div>
                    <h1 id="pageTitle" class="text-sm font-extrabold text-blue-900 leading-none">e-Presensi</h1>
                    <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mt-1">RRI Manado</p>
                </div>
            </div>
            <button id="toggleViewBtn" onclick="toggleView()" class="p-2 bg-slate-100 rounded-xl text-slate-600 hover:bg-blue-100 hover:text-blue-600 transition-all">
                <svg id="recapIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <svg id="backIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </button>
        </header>

        <!-- Tampilan Utama: Presensi -->
        <main id="presensiView" class="px-6 py-6 space-y-6">
            <div class="space-y-4">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Nama Pegawai</label>
                <input type="text" id="nameInput" oninput="filterPersonalHistory()" placeholder="Ketik nama lengkap Anda" class="w-full bg-white px-5 py-4 rounded-2xl border border-slate-200 font-bold outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-slate-300 transition-all">
            </div>

            <div class="video-wrapper">
                <video id="video" autoplay playsinline muted></video>
                <img id="photoPreview" class="captured-photo" alt="Preview Foto">
                
                <div id="timeOverlay" class="timestamp-overlay">
                    <div id="timeStamp">--:--:--</div>
                    <div id="locationLabel" class="text-[10px] text-emerald-300 mt-1 font-medium">📍 FVJ2+G78, TIKALA ARES</div>
                </div>
            </div>

            <!-- Tombol Aksi Langsung -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handlePresence('Masuk')" class="btn-gradient py-5 rounded-2xl text-white font-black shadow-lg active:scale-95 transition-all flex flex-col items-center">
                    <span>MASUK</span>
                    <span class="text-[9px] opacity-70 font-normal mt-1">Foto Otomatis</span>
                </button>
                <button onclick="handlePresence('Pulang')" class="bg-slate-900 py-5 rounded-2xl text-white font-black shadow-lg active:scale-95 transition-all flex flex-col items-center">
                    <span>PULANG</span>
                    <span class="text-[9px] opacity-70 font-normal mt-1">Foto Otomatis</span>
                </button>
            </div>

            <!-- Riwayat Absen Pegawai (Personal) -->
            <div class="mt-4">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Riwayat Saya</h3>
                    <span id="historyCount" class="text-[10px] bg-slate-100 px-2 py-0.5 rounded-full text-slate-500 font-bold">0 data</span>
                </div>
                <div id="personalHistory" class="space-y-3 max-h-80 overflow-y-auto custom-scroll pr-1">
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 text-center py-6">
                        <p class="text-[11px] text-slate-400 italic">Masukkan nama untuk melihat riwayat</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Tampilan Rekapitulasi -->
        <main id="recapView" class="px-6 py-6 space-y-6 hidden">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-extrabold text-slate-800 tracking-tight">Data Presensi</h2>
                <button onclick="downloadCSV()" class="text-[10px] font-black bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg uppercase tracking-wider hover:bg-emerald-200 transition-colors">Unduh CSV</button>
            </div>
            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[450px]">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nama</th>
                            <th class="px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                            <th class="px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Waktu</th>
                            <th class="px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="recapBody" class="text-xs font-bold text-slate-700">
                        <tr><td colspan="4" class="px-4 py-8 text-center text-slate-400 italic">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <canvas id="canvas" class="hidden"></canvas>
    <div id="toast" class="fixed bottom-10 left-6 right-6 bg-slate-900 text-white p-4 rounded-2xl text-sm font-bold opacity-0 transition-all duration-500 pointer-events-none z-[200] text-center shadow-xl"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rri-presensi-manado';

        try {
            const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
            const firebaseConfig = JSON.parse(firebaseConfigStr);
            if (Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) { console.error(e); }

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyN_OfL1SspcZFsZ4gtB3D89jdCi2kkdEJ_6hz1DUDCGmp0yX_NaDHvOJUNWWxBQohkhQ/exec"; 
        const fixedAddress = "FVJ2+G78, Tikala Ares, Kec. Tikala, Kota Manado, Sulawesi Utara";
        const fixedLat = "1.4814576";
        const fixedLng = "124.8506251";
        const googleMapsLink = `https://www.google.com/maps/search/?api=1&query=${fixedLat},${fixedLng}`;

        let userAuthenticated = false;
        let attendanceData = [];
        let unsubscribe = null;
        let stream = null;

        const initAuth = async () => {
            if (!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else { await signInAnonymously(auth); }
            } catch (e) { console.error(e); }
        };

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userAuthenticated = true;
                    listenToAttendance();
                }
            });
        }

        window.addEventListener('load', () => {
            initAuth();
            initCamera();
            setInterval(() => {
                const el = document.getElementById('timeStamp');
                if(el) el.innerText = new Date().toLocaleTimeString('id-ID');
            }, 1000);
        });

        async function initCamera() {
            try {
                if (stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1080 } } 
                });
                const videoEl = document.getElementById('video');
                videoEl.srcObject = stream;
                videoEl.play().catch(e => console.error(e));
                videoEl.style.display = 'block';
                document.getElementById('photoPreview').style.display = 'none';
            } catch (err) { showToast("Kamera error/ditolak.", "error"); }
        }

        function listenToAttendance() {
            if (!userAuthenticated || !db) return;
            if (unsubscribe) unsubscribe();
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'attendance');
            unsubscribe = onSnapshot(colRef, (snapshot) => {
                attendanceData = snapshot.docs.map(doc => doc.data());
                attendanceData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                renderRecap();
                filterPersonalHistory();
            }, (error) => console.error(error));
        }

        function renderRecap() {
            const body = document.getElementById('recapBody');
            if (attendanceData.length === 0) {
                body.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-slate-400 italic">Belum ada data</td></tr>';
                return;
            }
            body.innerHTML = attendanceData.map(item => `
                <tr class="border-b border-slate-50">
                    <td class="px-4 py-3">${item.nama || 'Anonim'}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded-md text-[10px] ${item.status === 'Masuk' ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-600'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-slate-400 text-[10px]">${item.tanggal}<br>${item.jam}</td>
                    <td class="px-4 py-3 text-blue-500 text-[9px]">
                        <a href="${item.lokasi}" target="_blank" class="underline">Map</a>
                    </td>
                </tr>
            `).join('');
        }

        window.filterPersonalHistory = () => {
            const nameValue = document.getElementById('nameInput').value.trim();
            const nameSearch = nameValue.toLowerCase();
            const historyContainer = document.getElementById('personalHistory');
            const countBadge = document.getElementById('historyCount');
            
            if (!nameValue) {
                historyContainer.innerHTML = '<div class="bg-white p-4 rounded-2xl border border-slate-100 text-center py-6"><p class="text-[11px] text-slate-400 italic">Masukkan nama untuk melihat riwayat</p></div>';
                countBadge.innerText = '0 data';
                return;
            }

            const personalData = attendanceData.filter(item => item.nama && item.nama.toLowerCase().includes(nameSearch));
            countBadge.innerText = `${personalData.length} data`;

            if (personalData.length === 0) {
                historyContainer.innerHTML = '<div class="bg-white p-4 rounded-2xl border border-slate-100 text-center py-6"><p class="text-[11px] text-slate-400 italic">Belum ada riwayat</p></div>';
            } else {
                historyContainer.innerHTML = personalData.map(item => `
                    <div class="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3">
                            <img src="${item.foto}" class="history-thumb shadow-sm border border-slate-100" alt="Foto">
                            <div>
                                <p class="text-[11px] font-black text-slate-800 leading-tight">${item.nama}</p>
                                <p class="text-[9px] font-bold ${item.status === 'Masuk' ? 'text-blue-500' : 'text-rose-500'} mt-0.5">${item.status.toUpperCase()} • ${item.jam}</p>
                                <p class="text-[8px] text-slate-400">${item.tanggal}</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <a href="${item.lokasi}" target="_blank" class="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-blue-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </a>
                        </div>
                    </div>
                `).join('');
            }
        };

        window.toggleView = () => {
            const isRecap = document.getElementById('presensiView').classList.toggle('hidden');
            document.getElementById('recapView').classList.toggle('hidden');
            document.getElementById('recapIcon').classList.toggle('hidden');
            document.getElementById('backIcon').classList.toggle('hidden');
            document.getElementById('pageTitle').innerText = isRecap ? "Rekapitulasi" : "e-Presensi";
            if (!isRecap) initCamera();
        };

        async function generateWatermarkPhoto(statusText) {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const logoImg = document.getElementById('logoSource');
            
            const size = 1000;
            canvas.width = size; 
            canvas.height = size;
            
            ctx.translate(size, 0); 
            ctx.scale(-1, 1);
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const minDim = Math.min(vWidth, vHeight);
            ctx.drawImage(video, (vWidth-minDim)/2, (vHeight-minDim)/2, minDim, minDim, 0, 0, size, size);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            
            ctx.fillStyle = "rgba(0,0,0,0.75)"; 
            ctx.fillRect(0, 720, size, 280);
            
            if (logoImg && logoImg.complete && logoImg.naturalWidth !== 0) {
                const lSize = 130;
                ctx.drawImage(logoImg, size - 170, 750, lSize, lSize * (logoImg.naturalHeight / logoImg.naturalWidth));
            }

            ctx.fillStyle = "white"; 
            ctx.font = "bold 36px Arial";
            ctx.fillText("E-PRESENSI RRI MANADO", 40, 780);
            
            ctx.font = "bold 46px Arial";
            ctx.fillStyle = statusText.toUpperCase() === "MASUK" ? "#60a5fa" : "#fb7185";
            ctx.fillText(`KETERANGAN: ${statusText.toUpperCase()}`, 40, 840);

            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            const d = new Date();
            ctx.fillText(d.toLocaleDateString('id-ID', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'}), 40, 890);
            ctx.fillText(`Waktu: ${d.toLocaleTimeString('id-ID')}`, 40, 925);
            
            ctx.fillStyle = "#93c5fd";
            ctx.font = "bold 20px Arial";
            ctx.fillText(`📍 ${fixedAddress}`, 40, 960);
            ctx.font = "16px Arial";
            ctx.fillText(`Koordinat: ${fixedLat}, ${fixedLng}`, 40, 985);
            
            return canvas.toDataURL('image/jpeg', 0.85);
        }

        window.handlePresence = async (status) => {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) return showToast("Masukkan Nama Pegawai!", "error");
            
            const video = document.getElementById('video');
            if (!video.videoWidth) return showToast("Kamera belum siap", "error");

            document.getElementById('loadingOverlay').style.display = 'flex';
            
            try {
                const photoBase64 = await generateWatermarkPhoto(status);
                
                const preview = document.getElementById('photoPreview');
                preview.src = photoBase64;
                preview.style.display = 'block';
                video.style.display = 'none';

                const now = new Date();
                const data = {
                    nama: name, 
                    status: status, 
                    tanggal: now.toLocaleDateString('id-ID'), 
                    jam: now.toLocaleTimeString('id-ID'),
                    timestamp: now.toISOString(), 
                    foto: photoBase64,
                    lokasi: googleMapsLink,
                    alamat: fixedAddress,
                    userId: auth?.currentUser?.uid || "anon"
                };

                if (db) {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'attendance');
                    await addDoc(colRef, data);
                }

                if (SCRIPT_URL) {
                    const formData = new URLSearchParams();
                    formData.append('nama', data.nama);
                    formData.append('tanggal', data.tanggal);
                    formData.append('jam_masuk', status === 'Masuk' ? data.jam : '-');
                    formData.append('jam_pulang', status === 'Pulang' ? data.jam : '-');
                    formData.append('lokasi', data.lokasi);
                    formData.append('alamat', fixedAddress);
                    formData.append('foto', data.foto.split(',')[1]); 
                    fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' }).catch(() => {});
                }

                showToast(`Berhasil Presensi ${status}!`);
                
                setTimeout(() => {
                    initCamera();
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 2000);

            } catch (e) { 
                console.error(e);
                showToast("Gagal memproses data.", "error"); 
                document.getElementById('loadingOverlay').style.display = 'none';
                initCamera();
            }
        };

        function showToast(msg, type = "success") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = type === "success" ? "#0f172a" : "#ef4444";
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 3000);
        }

        window.downloadCSV = () => {
            if (attendanceData.length === 0) return;
            const headers = "Nama,Status,Tanggal,Jam,Alamat,Lokasi\n";
            const rows = attendanceData.map(i => `"${i.nama}",${i.status},${i.tanggal},${i.jam},"${i.alamat}","${i.lokasi}"`).join("\n");
            const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Rekap_Presensi_RRI.csv`;
            a.click();
        };
    </script>
</body>
</html>
